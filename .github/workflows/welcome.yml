name: 👋 Welcome New Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: |
            👋 Hey @${{ github.actor }}, thanks for opening your first issue on **Joanium**!

            We'll review this as soon as possible. While you wait:
            - 📖 Check the [docs](https://www.joanium.com) — your answer might already be there
            - 🔍 Browse similar issues to see if it's been discussed before
            - ⭐ If Joanium has been useful to you, a star goes a long way!

            A maintainer will be with you shortly. 🤖

          pr-message: |
            🎉 Your first pull request to **Joanium** — welcome to the family, @${{ github.actor }}!

            Here's what happens next:
            1. ✅ Automated checks will run on your PR
            2. 👀 A maintainer will review your changes
            3. 🚀 Once approved, it gets merged!

            Thank you for helping make Joanium better for everyone. 🙌
