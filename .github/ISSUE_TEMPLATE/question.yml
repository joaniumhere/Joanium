name: 💬 Question / Help
description: Ask a question or get help using Joanium
title: '[Question]: '
labels: ['question']
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check:
        - 📖 [Documentation](https://www.joanium.com)
        - 💬 [GitHub Discussions](https://github.com/joanium/joanium/discussions)
        - 🔍 Existing issues

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: How do I...?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant context that might help us answer (config, logs, what you've tried).
      placeholder: I already tried...

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Not relevant
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Joanium Version
      placeholder: e.g. 2026.419.0
