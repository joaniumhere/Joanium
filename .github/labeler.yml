bug:
  - head-branch: ['fix/', 'bugfix/', 'hotfix/', 'patch/']

enhancement:
  - head-branch: ['feat/', 'feature/']

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'Docs/**'

workflow:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - 'Skills/**'
          - 'Instructions/**'
          - 'SystemInstructions/**'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'package-lock.json'

configuration:
  - changed-files:
      - any-glob-to-any-file:
          - '*.yml'
          - '*.yaml'
          - '*.json'
          - 'Config/**'
          - '.editorconfig'
          - '.prettierrc*'
          - 'eslint.config*'

core:
  - changed-files:
      - any-glob-to-any-file:
          - 'Core/**'
          - 'App.js'

assets:
  - changed-files:
      - any-glob-to-any-file:
          - 'Assets/**'

personas:
  - changed-files:
      - any-glob-to-any-file:
          - 'Personas/**'
