<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openworld — Usage</title>
  <link rel="stylesheet" href="Assets/Styles/UsagePage.css" />
</head>
<body>

  <div id="app">

    <div id="titlebar">
      <div id="titlebar-drag">
        <svg class="titlebar-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 2L8 6H4v4L2 12l2 2v4h4l4 4 4-4h4v-4l2-2-2-2V6h-4L12 2z" stroke-width="1.5"/>
        </svg>
        <span class="titlebar-name">openworld</span>
      </div>
      <div id="titlebar-controls">
        <button id="btn-minimize" title="Minimize">
          <svg viewBox="0 0 12 12"><rect y="5.5" width="12" height="1" fill="currentColor"/></svg>
        </button>
        <button id="btn-maximize" title="Maximize / Restore">
          <svg viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button id="btn-close" title="Close">
          <svg viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div id="body-wrap">
      <aside id="sidebar"></aside>
      <div id="theme-panel"></div>
      <div id="avatar-panel"></div>

      <main id="main" class="usage-main">
        <div class="usage-scroll">

          <!-- Header -->
          <div class="usage-page-header">
            <div class="usage-page-header-copy">
              <h2>
                Usage
                <span class="live-badge">
                  <span class="live-dot"></span>
                  Live
                </span>
              </h2>
              <p>Token consumption, cost estimates, and model analytics — updated in real time</p>
            </div>
            <div class="usage-header-actions">
              <div class="usage-range-btns">
                <button class="usage-range-btn active" data-range="today">Today</button>
                <button class="usage-range-btn" data-range="7">7 days</button>
                <button class="usage-range-btn" data-range="30">30 days</button>
                <button class="usage-range-btn" data-range="all">All time</button>
              </div>
              <button class="usage-clear-btn" id="clear-usage-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Clear data
              </button>
            </div>
          </div>

          <!-- Summary cards -->
          <div class="usage-summary-grid" id="summary-grid">
            <!-- filled by JS -->
          </div>

          <!-- Daily chart + Model breakdown -->
          <div class="usage-sections">
            <div class="usage-section" id="chart-section">
              <div class="usage-section-header">
                <span class="usage-section-title" id="chart-title">Daily token usage</span>
                <span class="usage-section-meta" id="chart-meta"></span>
              </div>
              <div class="usage-chart-wrap" id="chart-wrap">
                <!-- SVG chart injected here -->
              </div>
            </div>
            <div class="usage-section" id="provider-section">
              <div class="usage-section-header">
                <span class="usage-section-title">Provider breakdown</span>
              </div>
              <div class="provider-grid" id="provider-grid">
                <!-- filled by JS -->
              </div>
            </div>
          </div>

          <!-- Model breakdown (full width) -->
          <div class="usage-section-full" id="model-section">
            <div class="usage-section-header">
              <span class="usage-section-title">Model breakdown</span>
              <span class="usage-section-meta" id="model-meta"></span>
            </div>
            <div class="model-rows" id="model-rows">
              <!-- filled by JS -->
            </div>
          </div>

          <!-- Recent activity -->
          <div class="usage-section-full" id="activity-section">
            <div class="usage-section-header">
              <span class="usage-section-title">Recent activity</span>
              <span class="usage-section-meta" id="activity-meta"></span>
            </div>
            <div id="activity-list" class="activity-list">
              <!-- filled by JS -->
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <!-- Confirm clear overlay -->
  <div class="usage-confirm-overlay" id="confirm-overlay">
    <div class="usage-confirm-box">
      <h3>Clear all usage data?</h3>
      <p>This will permanently delete all token usage history. This action cannot be undone.</p>
      <div class="usage-confirm-actions">
        <button class="usage-confirm-cancel" id="confirm-cancel">Cancel</button>
        <button class="usage-confirm-delete" id="confirm-delete">Clear data</button>
      </div>
    </div>
  </div>

  <script type="module" src="Assets/Scripts/Pages/Usage.js"></script>
</body>
</html>
